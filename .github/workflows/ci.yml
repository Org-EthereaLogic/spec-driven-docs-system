name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests (JSON + hooks + markdownlint)
        run: npm test

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability audit
        run: |
          set +e
          set -o pipefail
          npm audit --audit-level=moderate 2>&1 | tee /tmp/audit.txt
          AUDIT_EXIT=${PIPESTATUS[0]}
          set -e
          if [ $AUDIT_EXIT -ne 0 ]; then
            if grep -qE "403|ECONNREFUSED|ENOTFOUND|ETIMEDOUT" /tmp/audit.txt; then
              echo "::warning title=Dependency Audit::npm registry unreachable — vulnerability status unknown; manual review required before merge"
            else
              cat /tmp/audit.txt
              exit $AUDIT_EXIT
            fi
          fi

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  isolated-install:
    name: Isolated Install Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run isolated install script
        run: bash tests/setup-isolated-test.sh /tmp/spec-docs-ci

      - name: Verify isolated install contents
        run: |
          test -d /tmp/spec-docs-ci/.claude/commands/doc
          test -d /tmp/spec-docs-ci/specs/docs
          test -f /tmp/spec-docs-ci/source/task-manager-overview.md
          test -f /tmp/spec-docs-ci/test_progress.json
