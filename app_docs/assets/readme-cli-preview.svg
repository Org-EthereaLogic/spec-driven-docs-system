<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Spec-driven documentation workflow preview</title>
  <desc id="desc">A clean visual walkthrough of the plan, write, review, and promote stages used in this repository.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#111c33" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" rx="28" />

  <text x="70" y="86" fill="#dbeafe" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="1.5">
    SPEC-FIRST DOCUMENTATION SYSTEM
  </text>
  <text x="70" y="132" fill="#f8fafc" font-size="44" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">
    Typical command workflow
  </text>
  <text x="70" y="166" fill="#94a3b8" font-size="21" font-family="Inter, Segoe UI, Arial, sans-serif">
    Plan requirements, generate drafts, validate quality gates, then promote through stages.
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="210" width="760" height="440" rx="18" fill="#0a1120" stroke="#1e293b" />
    <rect x="70" y="210" width="760" height="44" rx="18" fill="#111827" />
    <circle cx="98" cy="232" r="6" fill="#fb7185" />
    <circle cx="118" cy="232" r="6" fill="#fbbf24" />
    <circle cx="138" cy="232" r="6" fill="#34d399" />
    <text x="342" y="238" fill="#93a4bd" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">
      CLI session preview
    </text>
  </g>

  <text x="102" y="295" fill="#22d3ee" font-size="20" font-weight="700" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    $ /doc-plan "User authentication API" --type api
  </text>
  <text x="132" y="326" fill="#cbd5e1" font-size="17" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    -> specs/docs/user-authentication-api-spec.md
  </text>

  <text x="102" y="382" fill="#60a5fa" font-size="20" font-weight="700" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    $ /doc-write specs/docs/user-authentication-api-spec.md
  </text>
  <text x="132" y="413" fill="#cbd5e1" font-size="17" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    -> spec_driven_docs/rough_draft/api/user-authentication.md
  </text>

  <text x="102" y="470" fill="#fbbf24" font-size="20" font-weight="700" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    $ /doc-review spec_driven_docs/rough_draft/api/user-authentication.md --fix
  </text>
  <text x="132" y="501" fill="#cbd5e1" font-size="17" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    -> checks completeness, content quality, consistency, and final approval
  </text>

  <rect x="102" y="548" width="165" height="34" rx="17" fill="#052e2b" stroke="#14b8a6" stroke-opacity="0.45" />
  <rect x="282" y="548" width="170" height="34" rx="17" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.45" />
  <rect x="467" y="548" width="146" height="34" rx="17" fill="#422006" stroke="#f59e0b" stroke-opacity="0.45" />
  <rect x="628" y="548" width="172" height="34" rx="17" fill="#14532d" stroke="#22c55e" stroke-opacity="0.45" />

  <text x="121" y="570" fill="#99f6e4" font-size="13" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">SPEC COMPLETE</text>
  <text x="302" y="570" fill="#7dd3fc" font-size="13" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">QUALITY VERIFIED</text>
  <text x="489" y="570" fill="#fcd34d" font-size="13" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">CONSISTENT</text>
  <text x="649" y="570" fill="#bbf7d0" font-size="13" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">READY TO PROMOTE</text>

  <g filter="url(#shadow)">
    <rect x="860" y="210" width="270" height="440" rx="18" fill="#0f172a" stroke="#1e293b" />
  </g>

  <text x="890" y="262" fill="#f8fafc" font-size="29" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">Stage movement</text>
  <text x="890" y="294" fill="#94a3b8" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">Promotion is unlocked after review.</text>

  <rect x="890" y="334" width="210" height="54" rx="14" fill="#111827" stroke="#38bdf8" stroke-opacity="0.6" />
  <rect x="890" y="430" width="210" height="54" rx="14" fill="#111827" stroke="#fbbf24" stroke-opacity="0.6" />
  <rect x="890" y="526" width="210" height="54" rx="14" fill="#111827" stroke="#22c55e" stroke-opacity="0.6" />

  <path d="M995 388v42" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" />
  <path d="M995 484v42" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" />

  <text x="925" y="366" fill="#e2e8f0" font-size="19" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">specs/docs/</text>
  <text x="920" y="462" fill="#e2e8f0" font-size="19" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">rough_draft/</text>
  <text x="904" y="558" fill="#e2e8f0" font-size="19" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">pending -> approved</text>

  <rect x="890" y="604" width="210" height="24" rx="12" fill="#082f49" />
  <text x="906" y="621" fill="#bae6fd" font-size="12" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">CI: smoke tests + markdown lint</text>
</svg>
