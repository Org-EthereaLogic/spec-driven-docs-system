<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">EthereaLogic.ai spec-driven documentation workflow preview</title>
  <desc id="desc">A branded visual walkthrough of the plan, write, review, and promote stages used in this repository.</desc>

  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3A8DFF" />
      <stop offset="55%" stop-color="#9155F6" />
      <stop offset="100%" stop-color="#F24B94" />
    </linearGradient>
    <radialGradient id="ambientGlow" cx="82%" cy="18%" r="65%">
      <stop offset="0%" stop-color="#9155F6" stop-opacity="0.23" />
      <stop offset="44%" stop-color="#3A8DFF" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#050508" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panelGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10101A" stop-opacity="0.98" />
      <stop offset="100%" stop-color="#0A0A10" stop-opacity="0.98" />
    </linearGradient>
    <linearGradient id="stageLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A8DFF" />
      <stop offset="50%" stop-color="#9155F6" />
      <stop offset="100%" stop-color="#F24B94" />
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42" />
    </filter>
  </defs>

  <rect width="1200" height="720" fill="#050508" rx="28" />
  <rect width="1200" height="720" fill="url(#ambientGlow)" rx="28" />

  <text x="70" y="80" fill="url(#brandGradient)" font-size="30" font-weight="700" font-family="Inter, system-ui, sans-serif">
    EthereaLogic.ai<tspan font-size="12" font-weight="500" dy="-11" dx="2" fill="#8585A0">TM</tspan>
  </text>
  <text x="70" y="124" fill="#E8E8ED" font-size="44" font-weight="700" font-family="Inter, system-ui, sans-serif">
    Spec-driven document pipeline
  </text>
  <text x="70" y="160" fill="#A0A0B4" font-size="21" font-family="Inter, system-ui, sans-serif">
    Plan requirements, generate drafts, validate evidence, then promote approved documentation.
  </text>
  <rect x="70" y="183" width="64" height="3" fill="url(#brandGradient)" rx="1.5" />

  <g filter="url(#shadow)">
    <rect x="70" y="220" width="760" height="430" rx="16" fill="url(#panelGradient)" stroke="#1A1A28" />
    <rect x="70" y="220" width="760" height="45" rx="16" fill="#0A0A10" stroke="#1A1A28" />
    <rect x="70" y="252" width="760" height="13" fill="#0A0A10" />
    <circle cx="100" cy="243" r="6" fill="#3A8DFF" />
    <circle cx="121" cy="243" r="6" fill="#9155F6" />
    <circle cx="142" cy="243" r="6" fill="#F24B94" />
    <text x="335" y="249" fill="#8585A0" font-size="14" font-family="Inter, system-ui, sans-serif">
      CLI session preview
    </text>
  </g>

  <rect x="96" y="292" width="5" height="320" fill="url(#stageLine)" rx="2.5" />

  <text x="122" y="304" fill="#3A8DFF" font-size="20" font-weight="700" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    $ /doc-plan &quot;User authentication API&quot; --type api
  </text>
  <text x="122" y="334" fill="#A0A0B4" font-size="16" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    -&gt; specs/docs/user-authentication-api-spec.md
  </text>

  <text x="122" y="389" fill="#9155F6" font-size="20" font-weight="700" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    $ /doc-write specs/docs/user-authentication-api-spec.md
  </text>
  <text x="122" y="419" fill="#A0A0B4" font-size="16" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    -&gt; spec_driven_docs/rough_draft/api/user-authentication.md
  </text>

  <text x="122" y="474" fill="#F24B94" font-size="20" font-weight="700" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    $ /doc-review spec_driven_docs/rough_draft/api/
  </text>
  <text x="152" y="504" fill="#F24B94" font-size="20" font-weight="700" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    user-authentication.md --fix
  </text>
  <text x="122" y="534" fill="#A0A0B4" font-size="16" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    -&gt; checks completeness, content quality, consistency, and approval gates
  </text>

  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="12" font-weight="600">
    <rect x="122" y="582" width="138" height="32" rx="6" fill="#0A0A10" stroke="#3A8DFF" stroke-opacity="0.44" />
    <rect x="276" y="582" width="156" height="32" rx="6" fill="#0A0A10" stroke="#9155F6" stroke-opacity="0.44" />
    <rect x="448" y="582" width="128" height="32" rx="6" fill="#0A0A10" stroke="#F24B94" stroke-opacity="0.44" />
    <rect x="592" y="582" width="176" height="32" rx="6" fill="#0A0A10" stroke="#22C55E" stroke-opacity="0.44" />
    <text x="138" y="603" fill="#AFCFFF">SPEC COMPLETE</text>
    <text x="292" y="603" fill="#C8B6FF">QUALITY VERIFIED</text>
    <text x="464" y="603" fill="#FFC1DA">CONSISTENT</text>
    <text x="608" y="603" fill="#A7F3C8">READY TO PROMOTE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="220" width="270" height="430" rx="16" fill="#0A0A10" stroke="#1A1A28" />
    <rect x="860" y="220" width="270" height="3" fill="url(#brandGradient)" />
  </g>

  <text x="890" y="270" fill="#E8E8ED" font-size="28" font-weight="700" font-family="Inter, system-ui, sans-serif">Stage movement</text>
  <text x="890" y="302" fill="#A0A0B4" font-size="16" font-family="Inter, system-ui, sans-serif">Promotion unlocks after review.</text>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="890" y="342" width="210" height="54" rx="10" fill="#10101A" stroke="#3A8DFF" stroke-opacity="0.55" />
    <rect x="890" y="438" width="210" height="54" rx="10" fill="#10101A" stroke="#9155F6" stroke-opacity="0.55" />
    <rect x="890" y="534" width="210" height="54" rx="10" fill="#10101A" stroke="#F24B94" stroke-opacity="0.55" />

    <path d="M995 396v42" stroke="url(#stageLine)" stroke-width="5" stroke-linecap="round" />
    <path d="M995 492v42" stroke="url(#stageLine)" stroke-width="5" stroke-linecap="round" />

    <text x="925" y="374" fill="#E8E8ED" font-size="19" font-weight="700">specs/docs/</text>
    <text x="920" y="470" fill="#E8E8ED" font-size="19" font-weight="700">rough_draft/</text>
    <text x="904" y="566" fill="#E8E8ED" font-size="19" font-weight="700">pending -> approved</text>
  </g>

  <rect x="890" y="614" width="210" height="24" rx="6" fill="#10101A" stroke="#1A1A28" />
  <circle cx="906" cy="626" r="4" fill="#22C55E" />
  <text x="918" y="630" fill="#8585A0" font-size="12" font-weight="600" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">smoke tests + markdown lint</text>
</svg>